<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Wrapped</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="container">
    <h1>GitHub Wrapped</h1>

    <p class="sub">See your dev stats + global leaderboard</p>

    <div class="input-row">
      <input id="username" placeholder="GitHub username..." />
      <button onclick="generateWrapped()">Generate</button>
      <button onclick="loadLeaderboard()">Leaderboard</button>
    </div>

    <!-- WRAPPED OUTPUT -->
    <div id="output"></div>

    <!-- LEADERBOARD -->
    <div id="leaderboard"></div>
  </div>

  <!-- SCRIPTS  -->
  <script src="supabase.js"></script>
  <script src="github.js"></script>
  <script src="stats.js"></script>
  <script src="leaderboard.js"></script>
  <script src="sharecard.js"></script>
  <script src="app.js"></script>

</body>
</html>
